name: Deploy Backend To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.BACKEND_DEPLOY_PATH }}"
            git fetch origin
            git checkout main
            git reset --hard origin/main

            npm install --include=dev --legacy-peer-deps --no-audit --no-fund
            npx prisma generate
            runuser -u postgres -- sh -c "cd '${{ secrets.BACKEND_DEPLOY_PATH }}' && DATABASE_URL=postgresql://postgres@localhost/dynamo_prod?host=/var/run/postgresql npx prisma db push --accept-data-loss"
            npm run build
            test -f dist/src/main.js

            APP_NAME="dynamo-backend"
            pm2 delete "$APP_NAME" > /dev/null 2>&1 || true
            pm2 start dist/src/main.js --name "$APP_NAME" --cwd "${{ secrets.BACKEND_DEPLOY_PATH }}" --uid postgres --gid postgres

            pm2 save
