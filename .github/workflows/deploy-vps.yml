name: Deploy Backend To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.BACKEND_DEPLOY_PATH }}"
            git fetch origin
            git checkout main
            git reset --hard origin/main

            npm ci
            npx prisma generate
            npx prisma migrate deploy
            npm run build

            if pm2 describe "${{ secrets.BACKEND_PM2_APP }}" > /dev/null; then
              pm2 restart "${{ secrets.BACKEND_PM2_APP }}" --update-env
            else
              pm2 start npm --name "${{ secrets.BACKEND_PM2_APP }}" -- run start:prod
            fi

            pm2 save
